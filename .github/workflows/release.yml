name: Build/release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_windows:
    name: Build Windows x64
    runs-on: windows-2022
    env:
      ELECTRON_BUILDER_HTTP_TIMEOUT: 6000000
      ELECTRON_MIRROR: 'https://npmmirror.com/mirrors/electron/'
      BUILD_PLATFORM: win32
      BUILD_ARCH: x64
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 20.14.0

      - name: Download Windows addon
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force temp-artifacts
          Invoke-WebRequest `
            -Uri "https://github.com/buxuku/whisper.cpp/releases/download/latest/addon-windows-x64.node" `
            -OutFile "temp-artifacts/addon-windows-x64.node"

      - name: Prepare Windows addon
        shell: pwsh
        run: |
          Copy-Item -Path "temp-artifacts/addon-windows-x64.node" -Destination "extraResources/addons/addon.node"
          node scripts/inject-build-info.js

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Compile application code
        run: yarn build

      - name: Build Electron app
        shell: pwsh
        run: yarn run electron-builder --win --x64 --publish never

      - name: Stage Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging
          Copy-Item "dist/*.exe" staging -ErrorAction SilentlyContinue
          Copy-Item "dist/*latest*.yml" staging -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse staging

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-pkg-windows-x64
          path: staging/*.exe
          if-no-files-found: error

      - name: Upload Windows update YAML artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-yaml-windows-x64
          path: staging/*latest*.yml
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    runs-on: windows-2022
    needs: build_windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_build_artifacts

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force final_release_assets
          Get-ChildItem -Path all_build_artifacts -Recurse -File |
            Where-Object { $_.Extension -eq ".exe" -or $_.Name -like "*latest*.yml" } |
            Copy-Item -Destination final_release_assets
          Get-ChildItem -Recurse final_release_assets

      - name: Check if beta release
        id: check_beta
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -like "*beta*") {
            "is_beta=true" >> $env:GITHUB_OUTPUT
          } else {
            "is_beta=false" >> $env:GITHUB_OUTPUT
          }

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: ${{ steps.check_beta.outputs.is_beta == 'true' }}
          prerelease: ${{ steps.check_beta.outputs.is_beta == 'true' }}
          files: final_release_assets/*
