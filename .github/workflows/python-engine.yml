name: Build Python Engine

# Python 引擎(faster-whisper sidecar)独立于主应用构建,产物挂到
# py-engine-v* 的 Release 上,主应用 release.yml 按固定 tag 下载复用,
# 与 whisper.cpp addon 的分发模式保持一致。
on:
  workflow_dispatch:
  push:
    tags:
      - 'py-engine-v*'

jobs:
  build_engine:
    name: Engine ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_suffix: macos-arm64
            binary: dist/smartsub-engine/smartsub-engine
            archive: smartsub-engine-macos-arm64.tar.gz

          - os: macos-15-intel
            artifact_suffix: macos-x64
            binary: dist/smartsub-engine/smartsub-engine
            archive: smartsub-engine-macos-x64.tar.gz

          - os: windows-2022
            artifact_suffix: windows-x64
            binary: dist/smartsub-engine/smartsub-engine.exe
            archive: smartsub-engine-windows-x64.tar.gz

          - os: ubuntu-22.04
            artifact_suffix: linux-x64
            binary: dist/smartsub-engine/smartsub-engine
            archive: smartsub-engine-linux-x64.tar.gz

    defaults:
      run:
        working-directory: python-engine

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: python-engine/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build frozen engine
        run: pyinstaller --clean --noconfirm smartsub-engine.spec

      - name: Smoke test frozen engine
        run: python smoke_test.py ${{ matrix.binary }}

      - name: Report size
        shell: bash
        run: du -sh dist/smartsub-engine

      # tar.gz 保留 Unix 可执行位,Windows runner 的 bash 同样自带 tar
      - name: Archive
        shell: bash
        run: tar -czf ${{ matrix.archive }} -C dist smartsub-engine

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: py-engine-${{ matrix.artifact_suffix }}
          path: python-engine/${{ matrix.archive }}
          if-no-files-found: error

  publish_engine:
    name: Publish Engine Release
    runs-on: ubuntu-latest
    needs: build_engine
    if: startsWith(github.ref, 'refs/tags/py-engine-v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum smartsub-engine-*.tar.gz > checksums.sha256
          cat checksums.sha256

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            SmartSub Python 引擎(faster-whisper sidecar)预构建产物。
            由主应用 release 工作流按 tag 下载,打进安装包的 extraResources/py-engine/。
          files: artifacts/*
